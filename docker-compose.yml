services:
  app:
    build: .
    ports:
      - "5000:5000"
    environment:
      - HOST=0.0.0.0
      - PORT=5000
      - PGHOST=db
      - PGUSER=${PGUSER:-dicoding}
      - PGDATABASE=${PGDATABASE:-forumapi}
      - PGPASSWORD=${PGPASSWORD:-dicoding}
      - PGPORT=5432
      - ACCESS_TOKEN_KEY=${ACCESS_TOKEN_KEY}
      - REFRESH_TOKEN_KEY=${REFRESH_TOKEN_KEY}
      - ACCESS_TOKEN_AGE=${ACCESS_TOKEN_AGE}
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "npm run migrate up && npm start"

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=${PGUSER:-dicoding}
      - POSTGRES_PASSWORD=${PGPASSWORD:-dicoding}
      - POSTGRES_DB=${PGDATABASE:-forumapi}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PGUSER:-dicoding} -d ${PGDATABASE:-forumapi}"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - pgdata:/var/lib/postgresql/data

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - app

volumes:
  pgdata:

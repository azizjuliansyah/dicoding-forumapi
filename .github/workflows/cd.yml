name: Continuous Deployment

on:
  workflow_run:
    workflows: ["Continuous Integration"]
    types:
      - completed
    branches:
      - main
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install cloudflared
        run: |
          curl -L https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 \
            -o /usr/local/bin/cloudflared
          chmod +x /usr/local/bin/cloudflared

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/dicoding_forumapi_github
          chmod 600 ~/.ssh/dicoding_forumapi_github

          cat > ~/.ssh/config << 'EOF'
          Host ssh.azizdev.my.id
            HostName ssh.azizdev.my.id
            User ubuntu
            IdentityFile ~/.ssh/dicoding_forumapi_github
            IdentitiesOnly yes
            PreferredAuthentications publickey
            ProxyCommand cloudflared access ssh --hostname ssh.azizdev.my.id --id ${{ secrets.CF_ACCESS_CLIENT_ID }} --secret ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
            StrictHostKeyChecking no
          EOF
          chmod 600 ~/.ssh/config

      - name: Build Docker image
        run: |
          docker build -t dicoding_forumapi:${{ github.sha }} .
          docker tag dicoding_forumapi:${{ github.sha }} dicoding_forumapi:latest

      - name: Save Docker image
        run: docker save dicoding_forumapi:latest | gzip > forumapi.tar.gz

      - name: Copy image ke server
        run: |
          scp forumapi.tar.gz ubuntu@ssh.azizdev.my.id:/tmp/

      - name: Deploy
        run: |
          ssh ubuntu@ssh.azizdev.my.id << 'ENDSSH'
            cd /opt/dicoding_forumapi
            git pull
            docker compose down
            docker compose up -d --build
            docker image prune -f
          ENDSSH

      - name: Verifikasi deployment
        run: |
          ssh ubuntu@ssh.azizdev.my.id << 'ENDSSH'
            if docker ps | grep -q dicoding_forumapi-app; then
              echo "Deployment berhasil!"
            else
              echo "Deployment gagal!" && exit 1
            fi
          ENDSSH